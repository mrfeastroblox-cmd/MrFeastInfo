<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FeastBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0d13;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      margin: 0;
      background: radial-gradient(circle at 30% 30%, #1c1f2a, #07090c);
    }

    .app-screen {
      width: 100%;
      max-width: 360px;
      min-height: 600px;
      background: rgba(14, 17, 23, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.9), inset 0 0 0 1px rgba(212, 175, 55, 0.3);
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(212, 175, 55, 0.35);
      overflow: hidden;
    }

    .content-area {
      flex: 1;
      padding: 14px 14px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      overflow-y: auto;
    }

    .app-title {
      width: 100%;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 3px;
      background: linear-gradient(180deg, #f7e9b0 0%, #c4a44a 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
      padding: 4px 0;
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
      margin-bottom: 2px;
    }

    /* Главная страница */
    .home-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .balance-header {
      width: 100%;
      text-align: center;
    }

    .balance-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #c2a35c;
      font-weight: 600;
      margin-bottom: 2px;
      text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
    }

    .balance-amount {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(180deg, #fef7d5 0%, #d9b84a 60%, #b58b2c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 3px 12px rgba(212, 175, 55, 0.7);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      line-height: 1;
    }

    .balance-amount i {
      background: none;
      -webkit-text-fill-color: #efcd5c;
      font-size: 1.8rem;
      text-shadow: 0 0 14px #d4af37;
    }

    .card {
      width: 100%;
      max-width: 310px;
      aspect-ratio: 1.6 / 1;
      background: linear-gradient(150deg, #262d38 0%, #0e121b 100%);
      border-radius: 18px;
      padding: 18px 18px 16px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.8), 0 0 0 1.5px rgba(212, 175, 55, 0.5), inset 0 0 20px rgba(212, 175, 55, 0.2);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(232, 200, 80, 0.6);
      background-image: 
        radial-gradient(circle at 15% 30%, rgba(212, 175, 55, 0.18) 0%, transparent 50%),
        radial-gradient(circle at 90% 70%, rgba(212, 175, 55, 0.12) 0%, transparent 55%),
        repeating-linear-gradient(35deg, rgba(212, 175, 55, 0.05) 0px, rgba(212, 175, 55, 0.05) 1px, transparent 1px, transparent 8px);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 16px;
      left: 16px;
      width: 40px;
      height: 32px;
      background: radial-gradient(circle at 30% 30%, #f5d742, #9e8028);
      border-radius: 6px;
      box-shadow: 0 0 16px #e4b532, inset 0 0 5px black;
      z-index: 2;
      border: 1px solid #ffeaa6;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 14px;
      background: repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.08) 0px, rgba(212, 175, 55, 0.08) 1px, transparent 1px, transparent 8px);
      pointer-events: none;
      z-index: 0;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      z-index: 3;
      position: relative;
    }

    .bank-name {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(180deg, #fbeeb0 0%, #c7a43b 85%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      margin-left: 50px;
      text-shadow: 0 0 10px #c9a53b;
      filter: drop-shadow(0 2px 3px black);
      line-height: 1;
    }

    .card-icon {
      font-size: 1.5rem;
      color: #e9c454;
      filter: drop-shadow(0 0 8px #e0b340);
      z-index: 3;
    }

    .card-number {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      word-spacing: 6px;
      color: #fbf3da;
      text-shadow: 0 2px 6px black;
      margin: 6px 0 4px;
      background: rgba(10, 12, 18, 0.5);
      backdrop-filter: blur(4px);
      padding: 6px 10px;
      border-radius: 8px;
      z-index: 3;
      position: relative;
      border: 1px solid rgba(212, 175, 55, 0.5);
      display: inline-block;
      align-self: flex-start;
      line-height: 1.3;
    }

    .expiry-section {
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 3;
      position: relative;
      margin-top: 4px;
    }

    .expiry-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      color: #d6b863;
      letter-spacing: 1.5px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .expiry-date {
      font-size: 0.95rem;
      font-weight: 650;
      color: #f3e4b0;
      letter-spacing: 1.5px;
      background: rgba(0,0,0,0.4);
      padding: 3px 8px;
      border-radius: 6px;
      display: inline-block;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 3;
      position: relative;
      margin-top: 4px;
    }

    .cardholder-placeholder {
      opacity: 0;
      height: 0.8rem;
    }

    .luxury-mark {
      color: #d4af37;
      font-size: 1.3rem;
      filter: drop-shadow(0 0 6px gold);
    }

    .earnings-panel {
      width: 100%;
      background: rgba(18, 21, 28, 0.8);
      backdrop-filter: blur(14px);
      border-radius: 40px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(212, 175, 55, 0.55);
      box-shadow: 0 12px 20px rgba(0,0,0,0.6);
    }

    .rate-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #efda8b;
      font-weight: 700;
      font-size: 0.9rem;
      background: #191e27;
      padding: 6px 14px;
      border-radius: 25px;
      letter-spacing: 0.3px;
    }

    .total-earned-text {
      color: #dac282;
      font-weight: 700;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .save-indicator {
      color: #6ad4b0;
      font-size: 0.6rem;
      margin-top: 2px;
    }

    /* Страница профиля */
    .profile-page {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4af37, #8b7a4c);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #fef7d5;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
      border: 2px solid #f5e7b3;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-avatar:active {
      transform: scale(0.95);
    }

    /* Редактирование имени */
    .profile-name-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .profile-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f0e2b0;
      letter-spacing: 1px;
      cursor: pointer;
      border-bottom: 2px dashed transparent;
      transition: border-color 0.2s;
      padding: 2px 4px;
    }

    .profile-name:hover {
      border-bottom-color: rgba(212, 175, 55, 0.5);
    }

    .edit-name-btn {
      background: none;
      border: none;
      color: #d4af37;
      cursor: pointer;
      font-size: 0.9rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .edit-name-btn:hover {
      opacity: 1;
    }

    .avatar-options {
      display: flex;
      gap: 8px;
      margin-top: 2px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .avatar-option {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.2);
      border: 1px solid rgba(212, 175, 55, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #d4af37;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .avatar-option:hover {
      background: rgba(212, 175, 55, 0.4);
    }

    .upload-avatar-btn {
      background: rgba(212, 175, 55, 0.25);
      border: 1px solid rgba(212, 175, 55, 0.6);
      color: #f0e2b0;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .upload-avatar-btn:hover {
      background: rgba(212, 175, 55, 0.4);
    }

    .profile-stats {
      width: 100%;
      background: rgba(18, 21, 28, 0.7);
      backdrop-filter: blur(14px);
      border-radius: 20px;
      padding: 16px;
      border: 1px solid rgba(212, 175, 55, 0.4);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #c2a35c;
      font-size: 0.9rem;
    }

    .stat-item i {
      width: 20px;
      text-align: center;
      color: #d4af37;
    }

    .stat-value {
      color: #f0e2b0;
      font-weight: 600;
      margin-left: auto;
    }

    .profile-info {
      width: 100%;
      background: rgba(18, 21, 28, 0.7);
      backdrop-filter: blur(14px);
      border-radius: 20px;
      padding: 16px;
      border: 1px solid rgba(212, 175, 55, 0.4);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #b9a577;
      font-size: 0.8rem;
    }

    .info-row i {
      color: #d4af37;
      width: 16px;
    }

    .info-value {
      color: #e0d3a8;
      font-weight: 500;
      margin-left: auto;
      font-size: 0.75rem;
      word-break: break-all;
      text-align: right;
    }

    /* Модальное окно для просмотра фото */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-image {
      max-width: 90%;
      max-height: 70%;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 1.5rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
    }

    .modal-icon {
      font-size: 8rem;
      color: #d4af37;
    }

    /* Нижняя панель */
    .bottom-nav {
      width: 100%;
      background: rgba(18, 21, 28, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(212, 175, 55, 0.4);
      padding: 10px 20px 12px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 20px;
      box-shadow: 0 -8px 20px rgba(0,0,0,0.5);
    }

    .nav-button {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #8b8f9e;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 12px;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-button i {
      font-size: 1.3rem;
    }

    .nav-button.active {
      color: #efda8b;
      background: rgba(212, 175, 55, 0.15);
      text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
    }

    .nav-button:active {
      transform: scale(0.95);
    }

    #nameEditInput {
      background: rgba(0,0,0,0.5);
      border: 1px solid #d4af37;
      color: #f0e2b0;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      font-family: 'Inter', sans-serif;
      width: 180px;
    }

    @media (max-width: 360px) {
      .bank-name {
        font-size: 1.3rem;
        margin-left: 44px;
      }
      .card-number {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Модальное окно для просмотра фото -->
  <div class="modal-overlay" id="imageModal" onclick="closeModal()">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <img class="modal-image" id="modalImage" src="" alt="Avatar" style="display:none;">
    <i class="fas fa-user-circle modal-icon" id="modalIcon" style="display:none;"></i>
  </div>

  <div class="app-screen">
    
    <div class="content-area" id="contentArea">
      
      <!-- Главная страница -->
      <div class="home-page" id="homePage">
        <div class="app-title">FeastBank</div>
        
        <div class="balance-header">
          <div class="balance-label">Текущий баланс</div>
          <div class="balance-amount" id="balanceTopDisplay">
            <i class="fas fa-dollar-sign"></i> <span id="balanceValueTop">0.00</span>
          </div>
        </div>

        <div class="card" id="feastCard">
          <div class="card-header">
            <span class="bank-name">FEASTBANK</span>
            <i class="fas fa-gem card-icon"></i>
          </div>
          
          <div class="card-number" id="cardNumberDisplay">6931 5719 0195 8195</div>
          
          <div class="expiry-section">
            <div>
              <span class="expiry-label">MONTH/YEAR</span>
              <div class="expiry-date" id="expiryDisplay">12/29</div>
            </div>
            <div>
              <span class="expiry-label">EXP</span>
              <div class="expiry-date" id="expiryEndDisplay">12-29</div>
            </div>
          </div>
          
          <div class="card-footer">
            <div class="cardholder-placeholder"></div>
            <div class="luxury-mark">
              <i class="fas fa-crown"></i>
            </div>
          </div>
        </div>

        <div class="earnings-panel">
          <div class="rate-badge">
            <i class="fas fa-clock"></i> +1$ / сек
          </div>
          <div class="total-earned-text">
            <span id="totalEarnedDisplay">0.00</span> $
          </div>
        </div>
        
        <div class="save-indicator" id="saveStatus">
          <i class="fas fa-cloud-upload-alt"></i> сохранено
        </div>
      </div>

      <!-- Страница профиля -->
      <div class="profile-page" id="profilePage">
        <div class="app-title">Профиль</div>
        
        <div class="profile-avatar" id="profileAvatar" onclick="showFullImage()">
          <i class="fas fa-user" id="defaultAvatarIcon"></i>
          <img id="avatarImage" src="" alt="Avatar" style="display: none;">
        </div>
        
        <div class="avatar-options">
          <div class="avatar-option" onclick="setDefaultAvatar('dollar')" title="Доллар">
            <i class="fas fa-dollar-sign"></i>
          </div>
          <div class="avatar-option" onclick="setDefaultAvatar('star')" title="Звезда">
            <i class="fas fa-star"></i>
          </div>
          <div class="avatar-option" onclick="setDefaultAvatar('crown')" title="Корона">
            <i class="fas fa-crown"></i>
          </div>
          <div class="avatar-option" onclick="setDefaultAvatar('gem')" title="Бриллиант">
            <i class="fas fa-gem"></i>
          </div>
        </div>
        
        <button class="upload-avatar-btn" onclick="document.getElementById('avatarUpload').click()">
          <i class="fas fa-camera"></i> Выборочно
        </button>
        <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="handleAvatarUpload(event)">
        
        <div class="profile-name-container" id="nameContainer">
          <span class="profile-name" id="profileNameDisplay" onclick="startEditName()">Пользователь</span>
          <button class="edit-name-btn" onclick="startEditName()" title="Изменить имя">
            <i class="fas fa-pen"></i>
          </button>
        </div>
        <input type="text" id="nameEditInput" style="display:none;" maxlength="25" placeholder="Введите имя">
        
        <div class="profile-stats">
          <div class="stat-item">
            <i class="fas fa-wallet"></i>
            <span>Баланс</span>
            <span class="stat-value" id="profileBalance">0.00 $</span>
          </div>
          <div class="stat-item">
            <i class="fas fa-coins"></i>
            <span>Заработано</span>
            <span class="stat-value" id="profileEarned">0.00 $</span>
          </div>
          <div class="stat-item">
            <i class="fas fa-credit-card"></i>
            <span>Карта</span>
            <span class="stat-value" id="profileCardNumber">****</span>
          </div>
        </div>

        <div class="profile-info">
          <div class="info-row">
            <i class="fas fa-globe"></i>
            <span>Страна</span>
            <span class="info-value" id="profileCountry">Определяется...</span>
          </div>
          <div class="info-row">
            <i class="fas fa-network-wired"></i>
            <span>IP</span>
            <span class="info-value" id="profileIP">Определяется...</span>
          </div>
        </div>
      </div>
      
    </div>

    <!-- Нижняя панель -->
    <div class="bottom-nav">
      <button class="nav-button active" id="homeBtn" onclick="switchPage('home')">
        <i class="fas fa-credit-card"></i>
        <span>Главная</span>
      </button>
      <button class="nav-button" id="profileBtn" onclick="switchPage('profile')">
        <i class="fas fa-user"></i>
        <span>Профиль</span>
      </button>
    </div>
  </div>

  <script>
    (function() {
      // Ключи localStorage
      const STORAGE_KEY_BALANCE = 'feastbank_balance';
      const STORAGE_KEY_TOTAL = 'feastbank_total_earned';
      const STORAGE_KEY_CARD_NUMBER = 'feastbank_card_number';
      const STORAGE_KEY_EXP_MONTH = 'feastbank_exp_month';
      const STORAGE_KEY_EXP_YEAR = 'feastbank_exp_year';
      const STORAGE_KEY_LAST_SAVE = 'feastbank_last_save';
      const STORAGE_KEY_AVATAR = 'feastbank_avatar';
      const STORAGE_KEY_USERNAME = 'feastbank_username';
      
      let balance = 0;
      let totalEarned = 0;
      let currentPage = 'home';
      let username = 'Пользователь';
      
      let cardData = {
        number: "6931 5719 0195 8195",
        expMonth: "12",
        expYear: "29",
        formatted: "12/29",
        endFormatted: "12-29"
      };
      
      // DOM элементы
      const balanceTopSpan = document.getElementById('balanceValueTop');
      const cardNumberEl = document.getElementById('cardNumberDisplay');
      const expiryEl = document.getElementById('expiryDisplay');
      const expiryEndEl = document.getElementById('expiryEndDisplay');
      const totalEarnedSpan = document.getElementById('totalEarnedDisplay');
      const saveStatusEl = document.getElementById('saveStatus');
      
      const homePage = document.getElementById('homePage');
      const profilePage = document.getElementById('profilePage');
      const homeBtn = document.getElementById('homeBtn');
      const profileBtn = document.getElementById('profileBtn');
      
      const profileBalance = document.getElementById('profileBalance');
      const profileEarned = document.getElementById('profileEarned');
      const profileCardNumber = document.getElementById('profileCardNumber');
      const profileCountry = document.getElementById('profileCountry');
      const profileIP = document.getElementById('profileIP');
      const profileNameDisplay = document.getElementById('profileNameDisplay');
      const defaultAvatarIcon = document.getElementById('defaultAvatarIcon');
      const avatarImage = document.getElementById('avatarImage');
      const nameEditInput = document.getElementById('nameEditInput');
      const nameContainer = document.getElementById('nameContainer');
      
      function generateRandomCardNumber() {
        let digits = [];
        for (let i = 0; i < 16; i++) {
          digits.push(Math.floor(Math.random() * 10));
        }
        return digits.join('').replace(/(\d{4})(?=\d)/g, '$1 ');
      }
      
      function generateRandomExpiry() {
        const month = Math.floor(Math.random() * 12) + 1;
        const monthStr = month.toString().padStart(2, '0');
        const currentYear = new Date().getFullYear();
        const yearOffset = Math.floor(Math.random() * 6) + 2;
        const year = (currentYear + yearOffset) % 100;
        const yearStr = year.toString().padStart(2, '0');
        return {
          month: monthStr,
          year: yearStr,
          formatted: `${monthStr}/${yearStr}`,
          endFormatted: `${monthStr}-${yearStr}`
        };
      }
      
      function generateNewCardData() {
        const number = generateRandomCardNumber();
        const expiry = generateRandomExpiry();
        return {
          number: number,
          expMonth: expiry.month,
          expYear: expiry.year,
          formatted: expiry.formatted,
          endFormatted: expiry.endFormatted
        };
      }
      
      function saveToLocalStorage() {
        try {
          localStorage.setItem(STORAGE_KEY_BALANCE, balance.toString());
          localStorage.setItem(STORAGE_KEY_TOTAL, totalEarned.toString());
          localStorage.setItem(STORAGE_KEY_CARD_NUMBER, cardData.number);
          localStorage.setItem(STORAGE_KEY_EXP_MONTH, cardData.expMonth);
          localStorage.setItem(STORAGE_KEY_EXP_YEAR, cardData.expYear);
          localStorage.setItem(STORAGE_KEY_LAST_SAVE, Date.now().toString());
          localStorage.setItem(STORAGE_KEY_USERNAME, username);
          
          saveStatusEl.innerHTML = '<i class="fas fa-check-circle"></i> сохранено';
          saveStatusEl.style.color = '#6ad4b0';
          setTimeout(() => {
            saveStatusEl.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> сохранено';
            saveStatusEl.style.color = '#6ad4b0';
          }, 1500);
        } catch (e) {
          saveStatusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ошибка';
          saveStatusEl.style.color = '#f0a55a';
        }
      }
      
      function loadFromLocalStorage() {
        try {
          const savedBalance = localStorage.getItem(STORAGE_KEY_BALANCE);
          const savedTotal = localStorage.getItem(STORAGE_KEY_TOTAL);
          const savedCardNumber = localStorage.getItem(STORAGE_KEY_CARD_NUMBER);
          const savedExpMonth = localStorage.getItem(STORAGE_KEY_EXP_MONTH);
          const savedExpYear = localStorage.getItem(STORAGE_KEY_EXP_YEAR);
          const lastSaveTime = localStorage.getItem(STORAGE_KEY_LAST_SAVE);
          const savedUsername = localStorage.getItem(STORAGE_KEY_USERNAME);
          
          if (savedUsername) {
            username = savedUsername;
            profileNameDisplay.textContent = username;
          }
          
          let loaded = false;
          
          if (savedBalance !== null) {
            balance = parseFloat(savedBalance) || 0;
            loaded = true;
          }
          if (savedTotal !== null) {
            totalEarned = parseFloat(savedTotal) || 0;
            loaded = true;
          }
          
          if (savedCardNumber && savedExpMonth && savedExpYear) {
            cardData.number = savedCardNumber;
            cardData.expMonth = savedExpMonth;
            cardData.expYear = savedExpYear;
            cardData.formatted = `${savedExpMonth}/${savedExpYear}`;
            cardData.endFormatted = `${savedExpMonth}-${savedExpYear}`;
            loaded = true;
          } else {
            const newCard = generateNewCardData();
            cardData = newCard;
            loaded = true;
          }
          
          if (lastSaveTime && balance > 0) {
            const elapsedSeconds = Math.floor((Date.now() - parseInt(lastSaveTime)) / 1000);
            if (elapsedSeconds > 0 && elapsedSeconds < 86400) {
              balance += elapsedSeconds;
              totalEarned += elapsedSeconds;
            }
          }
          
          return loaded;
        } catch (e) {
          return false;
        }
      }
      
      function updateCardDisplay() {
        cardNumberEl.textContent = cardData.number;
        expiryEl.textContent = cardData.formatted;
        expiryEndEl.textContent = cardData.endFormatted;
      }
      
      function updateUI() {
        balanceTopSpan.textContent = balance.toFixed(2);
        totalEarnedSpan.textContent = totalEarned.toFixed(2);
        profileBalance.textContent = balance.toFixed(2) + ' $';
        profileEarned.textContent = totalEarned.toFixed(2) + ' $';
        profileCardNumber.textContent = cardData.number;
      }
      
      function addDollar() {
        balance += 1;
        totalEarned += 1;
        updateUI();
        
        if (Math.floor(balance) % 5 === 0) {
          saveToLocalStorage();
        }
      }
      
      // Редактирование имени
      window.startEditName = function() {
        nameContainer.style.display = 'none';
        nameEditInput.style.display = 'block';
        nameEditInput.value = username;
        nameEditInput.focus();
        nameEditInput.select();
      };
      
      nameEditInput.addEventListener('blur', function() {
        saveName();
      });
      
      nameEditInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          saveName();
        }
      });
      
      function saveName() {
        const newName = nameEditInput.value.trim();
        if (newName && newName.length > 0) {
          username = newName;
          profileNameDisplay.textContent = username;
          localStorage.setItem(STORAGE_KEY_USERNAME, username);
        }
        nameEditInput.style.display = 'none';
        nameContainer.style.display = 'flex';
      }
      
      // Переключение страниц
      window.switchPage = function(page) {
        currentPage = page;
        if (page === 'home') {
          homePage.style.display = 'flex';
          profilePage.style.display = 'none';
          homeBtn.classList.add('active');
          profileBtn.classList.remove('active');
        } else {
          homePage.style.display = 'none';
          profilePage.style.display = 'flex';
          profileBtn.classList.add('active');
          homeBtn.classList.remove('active');
          updateUI();
          fetchUserInfo();
        }
      };
      
      // Просмотр полного изображения
      window.showFullImage = function() {
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const modalIcon = document.getElementById('modalIcon');
        
        if (avatarImage.style.display === 'block' && avatarImage.src) {
          modalImage.src = avatarImage.src;
          modalImage.style.display = 'block';
          modalIcon.style.display = 'none';
        } else {
          modalImage.style.display = 'none';
          modalIcon.style.display = 'block';
          modalIcon.className = defaultAvatarIcon.className + ' modal-icon';
        }
        modal.classList.add('show');
      };
      
      window.closeModal = function() {
        document.getElementById('imageModal').classList.remove('show');
      };
      
      // Загрузка аватара
      window.handleAvatarUpload = function(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            avatarImage.src = e.target.result;
            avatarImage.style.display = 'block';
            defaultAvatarIcon.style.display = 'none';
            localStorage.setItem(STORAGE_KEY_AVATAR, e.target.result);
          };
          reader.readAsDataURL(file);
        }
      };
      
      window.setDefaultAvatar = function(type) {
        avatarImage.style.display = 'none';
        defaultAvatarIcon.style.display = 'block';
        const icons = {
          'dollar': 'fa-dollar-sign',
          'star': 'fa-star',
          'crown': 'fa-crown',
          'gem': 'fa-gem'
        };
        defaultAvatarIcon.className = `fas ${icons[type] || 'fa-user'}`;
        localStorage.setItem(STORAGE_KEY_AVATAR, `icon:${type}`);
      };
      
      function loadAvatar() {
        const savedAvatar = localStorage.getItem(STORAGE_KEY_AVATAR);
        if (savedAvatar) {
          if (savedAvatar.startsWith('icon:')) {
            const type = savedAvatar.split(':')[1];
            avatarImage.style.display = 'none';
            defaultAvatarIcon.style.display = 'block';
            const icons = {
              'dollar': 'fa-dollar-sign',
              'star': 'fa-star',
              'crown': 'fa-crown',
              'gem': 'fa-gem'
            };
            defaultAvatarIcon.className = `fas ${icons[type] || 'fa-user'}`;
          } else {
            avatarImage.src = savedAvatar;
            avatarImage.style.display = 'block';
            defaultAvatarIcon.style.display = 'none';
          }
        }
      }
      
      // Получение информации о пользователе
      async function fetchUserInfo() {
        try {
          const response = await fetch('https://ipapi.co/json/');
          const data = await response.json();
          profileCountry.textContent = data.country_name || 'Не определена';
          profileIP.textContent = data.ip || 'Не определен';
        } catch (e) {
          profileCountry.textContent = 'Не определена';
          profileIP.textContent = 'Не определен';
        }
      }
      
      function initApp() {
        const hasSavedData = loadFromLocalStorage();
        
        if (!hasSavedData) {
          const newCard = generateNewCardData();
          cardData = newCard;
          balance = 0;
          totalEarned = 0;
        }
        
        updateCardDisplay();
        updateUI();
        loadAvatar();
        saveToLocalStorage();
        
        if (window.gameInterval) clearInterval(window.gameInterval);
        window.gameInterval = setInterval(addDollar, 1000);
        
        if (window.saveInterval) clearInterval(window.saveInterval);
        window.saveInterval = setInterval(saveToLocalStorage, 10000);
      }
      
      initApp();
      
      window.addEventListener('beforeunload', () => {
        saveToLocalStorage();
        if (window.gameInterval) clearInterval(window.gameInterval);
        if (window.saveInterval) clearInterval(window.saveInterval);
      });
      
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          saveToLocalStorage();
        }
      });
      
    })();
  </script>
</body>
