  let currentServer = 'netherlands';

  function getPingForServer(group) {

      return Math.floor(Math.random() * 6) + 10; // 10-15 ms
    } else if (group === 'alotaxi') {
      return Math.floor(Math.random() * 16) + 15; // 15-30 ms

  function updateAllPingUI() {
    for (let [key, ping] of Object.entries(currentPings)) {
      const pct = Math.min((ping / 150) * 100, 100);
      document.querySelectorAll(`[data-ping-number="${key}"]`).forEach(el => {
        if(el) { el.textContent = ping; }
      });
      document.querySelectorAll(`[data-ping-fill="${key}"]`).forEach(el => { 
        if(el) { el.style.width = pct + '%'; }
      });
      document.querySelectorAll(`[data-ping-server="${key}"]`).forEach(el => { if(el) el.textContent = ping; });
      document.querySelectorAll(`[data-ping-fill-bar="${key}"]`).forEach(el => { if(el) { el.style.width = pct + '%'; } });
    }
    const optimal = Object.entries(currentPings).reduce((a,b) => a[1] < b[1] ? a : b);
    document.getElementById('optimalServerName').innerText = SERVERS[optimal[0]].name;
    document.getElementById('optimalPingBadge').innerHTML = `${optimal[1]}ms`;

      updateUISelectedServer();
    }

  function autoSelectFastestServer() {
    const fastest = Object.entries(currentPings).reduce((a,b) => a[1] < b[1] ? a : b);
    if (fastest[0] !== currentServer) { currentServer = fastest[0]; updateUISelectedServer(); }
  }
  
  function updateUISelectedServer() {

    });
