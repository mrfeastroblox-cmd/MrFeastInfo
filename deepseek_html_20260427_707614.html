<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>FeastCyberSecurity • AI Hash Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #020b1a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
      margin: 0;
      color: #e5e7eb;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Улучшенные анимированные неоновые круги */
    .background-circles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    /* Круг 1 - большой, медленный */
    .circle:nth-child(1) {
      width: 300px;
      height: 300px;
      left: 5%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
      border: 2px solid rgba(56, 189, 248, 0.4);
      box-shadow: 0 0 60px rgba(56, 189, 248, 0.3), 0 0 120px rgba(56, 189, 248, 0.15), inset 0 0 60px rgba(56, 189, 248, 0.1);
      animation-duration: 25s;
      animation-delay: 0s;
    }

    /* Круг 2 - средний */
    .circle:nth-child(2) {
      width: 200px;
      height: 200px;
      left: 25%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.2) 0%, transparent 70%);
      border: 2px solid rgba(14, 165, 233, 0.5);
      box-shadow: 0 0 50px rgba(14, 165, 233, 0.4), 0 0 100px rgba(14, 165, 233, 0.2);
      animation-duration: 18s;
      animation-delay: 3s;
    }

    /* Круг 3 - маленький, быстрый */
    .circle:nth-child(3) {
      width: 120px;
      height: 120px;
      left: 45%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.25) 0%, transparent 70%);
      border: 2px solid rgba(56, 189, 248, 0.6);
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.5), 0 0 80px rgba(56, 189, 248, 0.3);
      animation-duration: 12s;
      animation-delay: 1s;
    }

    /* Круг 4 - очень большой */
    .circle:nth-child(4) {
      width: 400px;
      height: 400px;
      left: 55%;
      background: radial-gradient(circle, rgba(2, 132, 199, 0.1) 0%, transparent 70%);
      border: 2px solid rgba(2, 132, 199, 0.3);
      box-shadow: 0 0 80px rgba(2, 132, 199, 0.2), 0 0 160px rgba(2, 132, 199, 0.1);
      animation-duration: 30s;
      animation-delay: 5s;
    }

    /* Круг 5 - средний, быстрый */
    .circle:nth-child(5) {
      width: 150px;
      height: 150px;
      left: 72%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, transparent 70%);
      border: 2px solid rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 45px rgba(56, 189, 248, 0.4), 0 0 90px rgba(56, 189, 248, 0.2);
      animation-duration: 15s;
      animation-delay: 7s;
    }

    /* Круг 6 - маленький */
    .circle:nth-child(6) {
      width: 100px;
      height: 100px;
      left: 88%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.3) 0%, transparent 70%);
      border: 2px solid rgba(14, 165, 233, 0.7);
      box-shadow: 0 0 35px rgba(14, 165, 233, 0.5), 0 0 70px rgba(14, 165, 233, 0.3);
      animation-duration: 10s;
      animation-delay: 2s;
    }

    /* Круг 7 - дополнительный для динамики */
    .circle:nth-child(7) {
      width: 180px;
      height: 180px;
      left: 35%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
      border: 2px solid rgba(56, 189, 248, 0.4);
      box-shadow: 0 0 55px rgba(56, 189, 248, 0.3), 0 0 110px rgba(56, 189, 248, 0.15);
      animation-duration: 22s;
      animation-delay: 10s;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(120vh) rotate(0deg) scale(0.8);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-20vh) rotate(360deg) scale(1.2);
        opacity: 0;
      }
    }

    .glass-panel {
      background: rgba(10, 15, 28, 0.9);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 2.5rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(56, 189, 248, 0.1), 0 0 100px rgba(56, 189, 248, 0.1);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 700px;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .shield-icon {
      font-size: 2.8rem;
      color: #38bdf8;
      filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.8));
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    h1 {
      font-weight: 800;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #e0f2fe, #38bdf8, #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #9ca3af;
      margin-bottom: 2.2rem;
      font-weight: 500;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .subtitle i {
      color: #38bdf8;
      font-size: 0.9rem;
    }

    .upload-card {
      background: rgba(15, 22, 37, 0.8);
      border: 1px dashed #2d3a52;
      border-radius: 1.8rem;
      padding: 1.8rem 1.5rem;
      margin-bottom: 2rem;
      transition: all 0.3s ease;
    }

    .upload-card:hover {
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.1);
    }

    .upload-card.dragover {
      border-color: #38bdf8;
      background: rgba(56, 189, 248, 0.05);
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.2);
    }

    .file-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
      cursor: pointer;
      font-weight: 600;
      color: #cbd5e1;
    }

    .file-label i {
      font-size: 2.4rem;
      color: #38bdf8;
      margin-bottom: 0.2rem;
      filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.5));
    }

    .file-input {
      display: none;
    }

    .file-name-display {
      margin-top: 1rem;
      font-size: 0.9rem;
      background: rgba(30, 41, 59, 0.8);
      padding: 0.5rem 1rem;
      border-radius: 3rem;
      color: #b9c7dd;
      text-align: center;
      font-weight: 500;
      word-wrap: break-word;
      overflow-wrap: break-word;
      hyphens: auto;
    }

    .hash-section {
      background: rgba(15, 22, 37, 0.8);
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(56, 189, 248, 0.1);
    }

    .hash-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.8rem;
    }

    .hash-display {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 1.2rem;
      padding: 1rem;
      margin-bottom: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #38bdf8;
      word-break: break-all;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .copy-btn {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      color: #38bdf8;
      padding: 0.4rem 0.8rem;
      border-radius: 1rem;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: rgba(56, 189, 248, 0.2);
      border-color: #38bdf8;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
    }

    .scan-btn {
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(14, 165, 233, 0.1));
      border: 1px solid rgba(56, 189, 248, 0.3);
      color: #38bdf8;
      font-weight: 700;
      padding: 0.8rem 1.8rem;
      border-radius: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      width: 100%;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .scan-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .scan-btn:hover::before {
      left: 100%;
    }

    .scan-btn:hover {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #020b1a;
      border-color: #38bdf8;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
      transform: translateY(-2px);
    }

    .scan-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* СОВРЕМЕННОЕ ОКНО РЕЗУЛЬТАТА */
    .result-container {
      position: relative;
      margin: 2rem 0 1rem;
      perspective: 1000px;
    }

    .result-box {
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border: 2px solid transparent;
      background: rgba(15, 22, 37, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .result-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 2rem;
      padding: 2px;
      background: linear-gradient(135deg, transparent, rgba(56, 189, 248, 0.3), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
    }

    .result-box.virus-result {
      background: linear-gradient(135deg, rgba(185, 28, 28, 0.2), rgba(239, 68, 68, 0.1));
      border-color: rgba(239, 68, 68, 0.4);
      box-shadow: 0 0 60px rgba(239, 68, 68, 0.3), 0 0 120px rgba(239, 68, 68, 0.1);
      animation: glitchRed 0.3s ease-in-out;
    }

    .result-box.clean-result {
      background: linear-gradient(135deg, rgba(4, 120, 87, 0.2), rgba(52, 211, 153, 0.1));
      border-color: rgba(52, 211, 153, 0.4);
      box-shadow: 0 0 60px rgba(52, 211, 153, 0.3), 0 0 120px rgba(52, 211, 153, 0.1);
      animation: glowGreen 2s ease-in-out infinite;
    }

    @keyframes glitchRed {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    @keyframes glowGreen {
      0%, 100% { box-shadow: 0 0 60px rgba(52, 211, 153, 0.3), 0 0 120px rgba(52, 211, 153, 0.1); }
      50% { box-shadow: 0 0 80px rgba(52, 211, 153, 0.5), 0 0 160px rgba(52, 211, 153, 0.2); }
    }

    .result-icon-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-icon-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      animation: rotate 3s linear infinite;
      opacity: 0.3;
    }

    .virus-result .result-icon-bg {
      background: conic-gradient(from 0deg, transparent, #ef4444, transparent);
    }

    .clean-result .result-icon-bg {
      background: conic-gradient(from 0deg, transparent, #34d399, transparent);
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .result-icon {
      position: relative;
      z-index: 1;
      font-size: 3rem;
      filter: drop-shadow(0 0 20px currentColor);
    }

    .virus-result .result-icon {
      color: #ef4444;
    }

    .clean-result .result-icon {
      color: #34d399;
    }

    .result-text {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -1px;
      text-transform: uppercase;
      text-align: center;
    }

    .virus-result .result-text {
      background: linear-gradient(to right, #fecaca, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .clean-result .result-text {
      background: linear-gradient(to right, #a7f0d0, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .ai-badge {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 3rem;
      padding: 0.5rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #e0f2fe;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .ai-badge i {
      color: #38bdf8;
      animation: pulse 2s ease-in-out infinite;
    }

    .result-details {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .detail-item {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 1rem;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .detail-item i {
      color: #38bdf8;
      font-size: 0.7rem;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(56, 189, 248, 0.3);
      border-radius: 50%;
      border-top-color: #38bdf8;
      animation: spin 1s linear infinite;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-note {
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 2rem;
      border-top: 1px solid rgba(30, 41, 59, 0.8);
      padding-top: 1.2rem;
    }

    @media (max-width: 500px) {
      .glass-panel {
        padding: 1.8rem 1.2rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      .hash-display {
        font-size: 0.7rem;
      }
      .result-text {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Улучшенные анимированные неоновые круги -->
  <div class="background-circles">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="glass-panel">
    <div class="logo-area">
      <i class="fas fa-shield-haltered shield-icon"></i>
      <h1>FeastCyberSecurity</h1>
    </div>
    <div class="subtitle">
      <i class="fas fa-microchip"></i> AI-Powered Threat Detection
    </div>

    <!-- Загрузка файла для проверки -->
    <div class="upload-card" id="dropZone">
      <label for="fileInput" class="file-label">
        <i class="fas fa-cloud-upload-alt"></i>
        <span>Drop file here or click to upload</span>
        <span style="font-size:0.75rem; font-weight:400; color:#6b7280;">Any file type supported</span>
      </label>
      <input type="file" id="fileInput" class="file-input">
      <div id="fileNameDisplay" class="file-name-display">
        <i class="far fa-file-alt"></i> No file selected
      </div>
    </div>

    <!-- Отображение SHA-256 -->
    <div class="hash-section">
      <div class="hash-label">
        <i class="fas fa-fingerprint"></i> <span>SHA-256 Hash</span>
      </div>
      <div class="hash-display" id="hashDisplay">
        <span style="color: #94a3b8; font-style: italic;">Upload a file to generate hash...</span>
      </div>
      <button class="scan-btn" id="scanButton" disabled>
        <i class="fas fa-shield-virus"></i> Scan with AI
      </button>
    </div>

    <!-- Современное окно результата -->
    <div class="result-container" id="resultContainer" style="display: none;">
      <div class="result-box" id="resultBox">
        <div class="result-icon-wrapper">
          <div class="result-icon-bg"></div>
          <div class="result-icon" id="resultIcon"></div>
        </div>
        <div class="result-text" id="resultText"></div>
        <div class="ai-badge" id="aiBadge"></div>
        <div class="result-details">
          <div class="detail-item">
            <i class="fas fa-weight-hanging"></i>
            <span id="fileSize">Size: -</span>
          </div>
          <div class="detail-item">
            <i class="fas fa-tag"></i>
            <span id="fileType">Type: -</span>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">
      <i class="fas fa-lock" style="margin-right: 0.3rem;"></i> FeastCyberSecurity • Advanced Threat Detection
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script>
    (function() {
      const SIGNATURES_URL = 'https://raw.githubusercontent.com/nacruka000-eng/malwary.txt/main/malwary.txt';
      
      let signatureSet = new Set();
      let signaturesLoaded = false;
      let currentFile = null;
      
      const fileInput = document.getElementById('fileInput');
      const dropZone = document.getElementById('dropZone');
      const fileNameDisplay = document.getElementById('fileNameDisplay');
      const hashDisplay = document.getElementById('hashDisplay');
      const scanButton = document.getElementById('scanButton');
      const resultContainer = document.getElementById('resultContainer');
      const resultBox = document.getElementById('resultBox');
      const resultIcon = document.getElementById('resultIcon');
      const resultText = document.getElementById('resultText');
      const aiBadge = document.getElementById('aiBadge');
      const fileSize = document.getElementById('fileSize');
      const fileType = document.getElementById('fileType');

      // Функция форматирования размера файла
      function formatFileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
      }

      // Функция получения типа файла
      function getFileType(file) {
        if (!file) return '-';
        const extension = file.name.split('.').pop().toUpperCase();
        if (extension && extension !== file.name) {
          return '.' + extension;
        }
        if (file.type) {
          return file.type.split('/')[1]?.toUpperCase() || file.type;
        }
        return 'Unknown';
      }

      async function loadSignatures() {
        try {
          const response = await fetch(SIGNATURES_URL);
          if (!response.ok) throw new Error('Failed to fetch');
          const text = await response.text();
          const lines = text.split(/\r?\n/);
          
          signatureSet.clear();
          for (let line of lines) {
            const trimmed = line.trim().toLowerCase();
            if (trimmed.length === 64 && /^[a-f0-9]{64}$/.test(trimmed)) {
              signatureSet.add(trimmed);
            }
          }
          
          signaturesLoaded = true;
          console.log(`Loaded ${signatureSet.size} signatures`);
        } catch (error) {
          console.error('Error loading signatures:', error);
          signatureSet.add('e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855');
          signatureSet.add('a7ffc6f8bf1ed76651c14756a061d662f580ff4de43b49fa82d80a4b80f8434a');
          signaturesLoaded = true;
        }
      }

      function calculateSHA256(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = function(e) {
            try {
              const wordArray = CryptoJS.lib.WordArray.create(e.target.result);
              const hash = CryptoJS.SHA256(wordArray).toString();
              resolve(hash);
            } catch (error) {
              reject(error);
            }
          };
          reader.onerror = reject;
          reader.readAsArrayBuffer(file);
        });
      }

      async function processFile(file) {
        if (!file) {
          fileNameDisplay.innerHTML = '<i class="far fa-file-alt"></i> No file selected';
          hashDisplay.innerHTML = '<span style="color: #94a3b8; font-style: italic;">Upload a file to generate hash...</span>';
          scanButton.disabled = true;
          hideResult();
          currentFile = null;
          return;
        }

        currentFile = file;
        fileNameDisplay.innerHTML = `<i class="far fa-file-alt"></i> ${file.name}`;
        hashDisplay.innerHTML = '<span class="loading-spinner"></span> Calculating SHA-256...';
        scanButton.disabled = true;
        hideResult();

        try {
          const hash = await calculateSHA256(file);
          hashDisplay.innerHTML = `
            <span style="flex: 1; word-break: break-all;">${hash}</span>
            <button class="copy-btn" onclick="navigator.clipboard.writeText('${hash}')">
              <i class="far fa-copy"></i> Copy
            </button>
          `;
          scanButton.disabled = false;
        } catch (error) {
          console.error('Error calculating hash:', error);
          hashDisplay.innerHTML = '<span style="color: #f87171;">Error calculating hash</span>';
          scanButton.disabled = true;
        }
      }

      fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) processFile(file);
      });

      dropZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });

      dropZone.addEventListener('dragleave', function(e) {
        e.preventDefault();
        dropZone.classList.remove('dragover');
      });

      dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          fileInput.files = files;
          processFile(files[0]);
        }
      });

      function hideResult() {
        resultContainer.style.display = 'none';
        resultBox.classList.remove('virus-result', 'clean-result');
      }

      function showResult(isVirus) {
        resultContainer.style.display = 'block';
        resultBox.classList.remove('virus-result', 'clean-result');
        
        // Обновление информации о файле
        if (currentFile) {
          fileSize.textContent = `Size: ${formatFileSize(currentFile.size)}`;
          fileType.textContent = `Type: ${getFileType(currentFile)}`;
        } else {
          fileSize.textContent = 'Size: -';
          fileType.textContent = 'Type: -';
        }
        
        if (isVirus) {
          resultBox.classList.add('virus-result');
          resultIcon.innerHTML = '<i class="fas fa-biohazard"></i>';
          resultText.textContent = 'Virus Detected';
          aiBadge.innerHTML = '<i class="fas fa-robot"></i> AI Detect: Virus <i class="fas fa-exclamation-triangle" style="color: #ef4444;"></i>';
        } else {
          resultBox.classList.add('clean-result');
          resultIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
          resultText.textContent = 'Not Virus';
          aiBadge.innerHTML = '<i class="fas fa-robot"></i> AI Detect: Not Virus <i class="fas fa-shield-alt" style="color: #34d399;"></i>';
        }
      }

      async function performScan() {
        if (!signaturesLoaded) {
          alert('Signature database is still loading...');
          return;
        }

        const hashElement = hashDisplay.querySelector('span');
        if (!hashElement) {
          alert('Please upload a file first.');
          return;
        }

        const hash = hashElement.textContent.trim();
        if (!hash || hash.includes('...') || hash.includes('Error')) {
          alert('Please upload a valid file.');
          return;
        }

        scanButton.disabled = true;
        scanButton.innerHTML = '<span class="loading-spinner"></span> Analyzing...';

        await new Promise(resolve => setTimeout(resolve, 1500));

        const normalizedHash = hash.toLowerCase();
        const isMalicious = signatureSet.has(normalizedHash);
        
        showResult(isMalicious);
        
        scanButton.disabled = false;
        scanButton.innerHTML = '<i class="fas fa-shield-virus"></i> Scan with AI';
      }

      scanButton.addEventListener('click', performScan);

      loadSignatures().then(() => {
        console.log('Signature database ready');
      });

      hideResult();
      scanButton.disabled = true;
    })();
  </script>
</body>
</html>
