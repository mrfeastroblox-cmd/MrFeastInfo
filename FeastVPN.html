        .servers-section {

            font-size: 10px;

            backdrop-filter: blur(20px);

            pointer-events: none;
            border: 0.5px solid #00ffaa66;
        }
        .toast-message.show {

            transform: translateX(-50%) scale(1);

        .thanks-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;

        .thanks-modal.active {

        .modal-glow-card {

            border-radius: 48px;

        .thanks-modal.active .modal-glow-card {

        }
        .modal-glow-card h2 {
            font-size: 26px;
            background: linear-gradient(125deg, #B0FFD0, #40E090);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }
        .modal-glow-card p {
            color: #ccddcc;
            font-size: 15px;
            margin-bottom: 28px;
        }
        .subscribe-modal-btn {
            background: #2f6e4a;
            border: none;
            padding: 14px 20px;
            width: 100%;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .close-modal-hint {
            background: transparent;
            border: none;
            color: #7a8a7a;
            font-size: 12px;
            cursor: pointer;
        }

        @media (max-width: 550px) {
            .card-server {
                flex-wrap: wrap;
            }
            .connect-button {
                margin-left: 0;
                margin-top: 10px;
                width: 100%;
            }
            .neon-trigger span {
                font-size: 13px;
            }
        }
    </style>
</head>

        {"name": "FeastVPN 8", "server": "alo.acharbashi.info", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d"},

        {"name": "FeastVPN 11", "server": "test.alotaxi.info", "port": 8443, "secret": "ee25773d1e79da8a2f549d1c38da5aae41626f6f6b696e672e636f6d"},
        {"name": "FeastVPN 12", "server": "baw.alotaxi.info", "port": 679, "secret": "41b712fe12019c64e281bcb6aeccded7"},
        {"name": "FeastVPN 13", "server": "jtproxy.life", "port": 443, "secret": "eef0050d30441bab41f60acae779df0c40766473696e612e7275"},
        {"name": "FeastVPN 14", "server": "ru.mt-proxy.org", "port": 443, "secret": "ee8dd152455f38a66cfab5de97f6bb2d596d742d70726f78792e6f7267"},
        {"name": "FeastVPN 15", "server": "vaslshid.co.uk.", "port": 85, "secret": "FgMBAgABAAH8AxOG4kw63Q=="},
        {"name": "FeastVPN 16", "server": "185.84.156.90", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e6d61782e7275"}
    ];

    let pingMap = new Map();
    let measuring = false;

    // ========== МАКСИМАЛЬНО ТОЧНОЕ ИЗМЕРЕНИЕ ПИНГА ==========
    // Одиночный TCP handshake замер
    async function measureSinglePing(server, port, timeoutMs = 2000) {
        const start = performance.now();
        return new Promise((resolve) => {
            let finished = false;
            const timer = setTimeout(() => {
                if (!finished) { finished = true; resolve(timeoutMs); }
            }, timeoutMs);
            
            const url = `https://${server}:${port}/ping-${Date.now()}-${Math.random()}.gif`;
            const img = new Image();
            
            img.onload = () => {
                if (!finished) {
                    clearTimeout(timer);
                    finished = true;
                    const elapsed = performance.now() - start;
                    resolve(Math.min(Math.floor(elapsed), timeoutMs));
                }
            };
            img.onerror = () => {
                if (!finished) {
                    clearTimeout(timer);
                    const elapsed = performance.now() - start;
                    // TCP handshake успешен даже при ошибке SSL/HTTP
                    if (elapsed < timeoutMs && elapsed > 5) {
                        finished = true;
                        resolve(Math.min(Math.floor(elapsed), timeoutMs));
                    } else {
                        // Fallback через fetch
                        const controller = new AbortController();
                        const fetchTimer = setTimeout(() => controller.abort(), timeoutMs);
                        fetch(url, {
                            method: 'HEAD',
                            mode: 'no-cors',
                            cache: 'no-store',
                            signal: controller.signal
                        }).then(() => {
                            if (!finished) {
                                clearTimeout(fetchTimer);
                                finished = true;
                                const elapsed2 = performance.now() - start;
                                resolve(Math.min(Math.floor(elapsed2), timeoutMs));
                            }
                        }).catch(() => {
                            if (!finished) {
                                clearTimeout(fetchTimer);
                                finished = true;
                                resolve(timeoutMs);
                            }
                        });
                    }
                }
            };
            img.src = url;
        });
    }

    // Тройной замер с медианой для максимальной точности
    async function measureAccuratePing(server, port, timeoutMs = 2000) {
        const results = [];
        for (let i = 0; i < 3; i++) {
            const ping = await measureSinglePing(server, port, timeoutMs);
            results.push(ping);
            if (ping < timeoutMs) await new Promise(r => setTimeout(r, 30));
        }
        results.sort((a, b) => a - b);
        return results[1]; // медиана
    }

    async function refreshAllPings() {
        if (measuring) return;
        measuring = true;
        
        // Показываем индикатор загрузки
        document.querySelectorAll('.ping-value-white').forEach(el => {
            el.textContent = '⏳';
        });
        
        // Параллельное измерение всех серверов
        const promises = MT_PROTO_SERVERS.map(async (srv) => {
            const key = `${srv.server}:${srv.port}`;
            const ping = await measureAccuratePing(srv.server, srv.port, 2000);
            pingMap.set(key, ping);
        });
        
        await Promise.all(promises);
        measuring = false;
        renderAllPings();
    }

    function renderAllPings() {
        document.querySelectorAll('.card-server').forEach(card => {
            const key = card.getAttribute('data-server-key');
            if (key && pingMap.has(key)) {
                const ping = pingMap.get(key);
                const pingSpan = card.querySelector('.ping-value-white');
                const pingDot = card.querySelector('.ping-dot');
                
                if (pingSpan) {
                    if (ping >= 2000) {
                        pingSpan.textContent = '⏱️';
                    } else {
                        pingSpan.textContent = `${ping} мс`;
                    }
                }
                
                if (pingDot && ping < 2000) {
                    pingDot.classList.remove('low', 'medium', 'high');
                    if (ping < 120) pingDot.classList.add('low');
                    else if (ping < 400) pingDot.classList.add('medium');
                    else pingDot.classList.add('high');
                }
            }
        });
    }

    function buildLink(srv) {
        return `tg://proxy?server=${encodeURIComponent(srv.server)}&port=${srv.port}&secret=${encodeURIComponent(srv.secret.trim().toLowerCase())}`;
    }

    function connectToServer(srv) {
        const link = buildLink(srv);
        showToast(`🔌 ${srv.name}: подключение...`);
        try {
            window.location.href = link;
            setTimeout(() => {
                if (!document.hidden) showToast("💡 Если Telegram не открылся — установите Telegram");
            }, 800);
            setTimeout(() => showThanksModal(), 950);
        } catch(e) {
            showToast("❌ Ошибка", true);
        }
    }

    function showThanksModal() {
        const modal = document.getElementById('thanksModal');
        if (!modal) return;
        modal.classList.add('active');
        modal.addEventListener('click', function bgClose(e) {
            if (e.target === modal) {
                modal.classList.remove('active');
                modal.removeEventListener('click', bgClose);
            }
        });
        const subscribeBtn = document.getElementById('modalSubscribeBtn');
        const closeBtn = document.getElementById('modalCloseBtn');
        subscribeBtn.onclick = () => {
            window.open('https://t.me/MrFeastChannel', '_blank');
            modal.classList.remove('active');
        };
        closeBtn.onclick = () => { modal.classList.remove('active'); };
    }

    // Выбор сервера с минимальным пингом
    function getMinPingServer() {
        let best = null;
        let bestPing = Infinity;
        
        for (let s of MT_PROTO_SERVERS) {
            const key = `${s.server}:${s.port}`;
            const ping = pingMap.get(key);
            if (ping && ping < bestPing && ping < 2000) {
                bestPing = ping;
                best = s;
            }
        }
        
        if (!best && MT_PROTO_SERVERS.length) best = MT_PROTO_SERVERS[0];
        return best;
    }

    function renderServerList() {
        const container = document.getElementById('unifiedServerList');
        if (!container) return;
        container.innerHTML = '';

        MT_PROTO_SERVERS.forEach(srv => {
            const key = `${srv.server}:${srv.port}`;
            const card = document.createElement('div');
            card.className = 'card-server';
            card.setAttribute('data-server-key', key);
            
            const leftDiv = document.createElement('div');
            leftDiv.className = 'server-info';
            
            const nameSpan = document.createElement('div');
            nameSpan.className = 'server-name-grad';
            nameSpan.textContent = srv.name;
            
            const statsRow = document.createElement('div');
            statsRow.style.display = 'flex';
            statsRow.style.alignItems = 'center';
            statsRow.style.gap = '16px';
            statsRow.style.flexWrap = 'wrap';
            
            // Пинг
            const pingContainer = document.createElement('div');
            pingContainer.className = 'ping-container';
            const pingDot = document.createElement('span');
            pingDot.className = 'ping-dot';
            const pingValSpan = document.createElement('span');
            pingValSpan.className = 'ping-value-white';
            pingValSpan.textContent = '⏳';
            pingContainer.appendChild(pingDot);
            pingContainer.appendChild(pingValSpan);
            
            statsRow.appendChild(pingContainer);
            
            const addrSpan = document.createElement('span');
            addrSpan.className = 'server-address';
            addrSpan.textContent = `${srv.server}:${srv.port}`;
            
            leftDiv.appendChild(nameSpan);
            leftDiv.appendChild(statsRow);
            leftDiv.appendChild(addrSpan);
            
            const connectBtn = document.createElement('div');
            connectBtn.className = 'connect-button';
            connectBtn.textContent = '▶ ПОДКЛЮЧИТЬ';
            
            card.appendChild(leftDiv);
            card.appendChild(connectBtn);
            
            card.addEventListener('click', () => connectToServer(srv));
            container.appendChild(card);
        });
        
        // Быстрое первичное измерение
        refreshAllPings();
        
        // Автообновление каждые 15 секунд
        if (window.pingInterval) clearInterval(window.pingInterval);
        window.pingInterval = setInterval(() => refreshAllPings(), 15000);
    }

    let autoRunning = false;
    async function autoConnectMinPing() {
        if (autoRunning) { showToast("⏳ Уже подключаем..."); return; }
        const btn = document.getElementById('autoNeonBtn');
        btn?.classList.add('active');
        autoRunning = true;
        showToast("🔍 Поиск сервера с минимальным пингом...");
        
        // Принудительное обновление пингов
        await refreshAllPings();
        
        const best = getMinPingServer();
        if (best) {
            const key = `${best.server}:${best.port}`;
            const ping = pingMap.get(key);
            const pingText = (ping && ping < 2000) ? `${ping} мс` : 'измеряется';
            showToast(`✨ Минимальный пинг: ${best.name} (${pingText})`);
            setTimeout(() => {
                connectToServer(best);
                setTimeout(() => btn?.classList.remove('active'), 1500);
                autoRunning = false;
            }, 300);
        } else {
            showToast("⚠️ Сервер не найден", true);
            btn?.classList.remove('active');
            autoRunning = false;
        }
    }

    let serversVisible = true;
    function toggleServers() {
        const wrapper = document.getElementById('serversWrapper');
        const toggleBtn = document.getElementById('serversToggleBtn');
        if (serversVisible) {
            wrapper.style.display = 'none';
            toggleBtn.classList.add('active');
            serversVisible = false;
        } else {
            wrapper.style.display = 'block';
            toggleBtn.classList.remove('active');
            serversVisible = true;
        }
    }

    function showToast(msg, isErr = false) {
        const t = document.getElementById('toastGlobal');
        if (!t) return;
        t.textContent = msg;
        t.style.background = isErr ? "#b13e4ccc" : "#121a24ee";
        t.classList.add('show');
        if (window.toastTmr) clearTimeout(window.toastTmr);
        window.toastTmr = setTimeout(() => t.classList.remove('show'), 2300);
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderServerList();
        const autoBtn = document.getElementById('autoNeonBtn');
        if (autoBtn) autoBtn.addEventListener('click', () => autoConnectMinPing());
        const serversToggle = document.getElementById('serversToggleBtn');
        if (serversToggle) serversToggle.addEventListener('click', toggleServers);
        showToast("🔥 16 MTProto серверов | Точный пинг");
    });
</script>
</body>
</html>
