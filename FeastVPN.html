<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>FeastVPN | MTProto + SOCKS5 | Минимальный пинг</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0a0f1e, #010101);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0,255,180,0.02) 0px, rgba(0,0,0,0.2) 2px);
            pointer-events: none;
            z-index: 0;
        }

        .glass-master {
            max-width: 680px;
            width: 100%;
            background: rgba(12, 18, 28, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            border: 1px solid rgba(0, 255, 170, 0.25);
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            overflow: hidden;
            z-index: 2;
        }

        .grad-header {
            padding: 28px 24px 20px 24px;
            background: linear-gradient(135deg, rgba(20, 28, 44, 0.9), rgba(8, 14, 24, 0.7));
            border-bottom: 1px solid rgba(0, 255, 170, 0.3);
        }

        .flex-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo-block {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-3d {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, #1c4d3a, #0a2a1c);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 6px #00ffaa;
            box-shadow: 0 0 14px rgba(0,255,170,0.4);
            animation: auraPulse 2.8s infinite;
        }

        @keyframes auraPulse {
            0% { box-shadow: 0 0 0 0 rgba(0,255,170,0.2);}
            70% { box-shadow: 0 0 0 10px rgba(0,255,170,0);}
            100% { box-shadow: 0 0 0 0 rgba(0,255,170,0);}
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(125deg, #E0FFEE, #70E0A0, #30D080);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge-neon {
            background: rgba(0, 255, 170, 0.12);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: #8effcc;
            border: 0.5px solid rgba(0,255,170,0.4);
        }

        /* неоновая кнопка автоподключения */
        .neon-btn-area {
            margin: 20px 24px 12px 24px;
        }
        .neon-trigger {
            background: rgba(20, 28, 44, 0.9);
            border: 1.5px solid rgba(0,255,170,0.5);
            border-radius: 70px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            cursor: pointer;
            transition: all 0.25s;
        }
        .neon-trigger span {
            font-weight: 700;
            color: #d0ffe8;
            font-size: 17px;
        }
        .neon-trigger.active {
            border-color: #00ffaa;
            background: #0f2f25cc;
            box-shadow: 0 0 18px #00ffaa55;
        }

        /* кнопка "Сервера" (под неоновой кнопкой) */
        .servers-toggle-btn {
            margin: 8px 24px 16px 24px;
        }
        .servers-toggle {
            background: rgba(20, 28, 44, 0.8);
            border: 1px solid rgba(0, 255, 170, 0.4);
            border-radius: 60px;
            padding: 12px 20px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .servers-toggle span {
            font-weight: 700;
            color: #c0f0dc;
            font-size: 16px;
        }
        .servers-toggle.active {
            border-color: #00ffaa;
            background: #0f2f25cc;
            box-shadow: 0 0 12px #00ffaa55;
        }

        /* контейнер серверов (единый список) */
        .servers-section {
            padding: 0 16px 16px 16px;
        }
        .server-scroll {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 55vh;
            overflow-y: auto;
            padding: 4px 4px 8px 4px;
        }
        .server-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .server-scroll::-webkit-scrollbar-track {
            background: #1e2632;
            border-radius: 10px;
        }
        .server-scroll::-webkit-scrollbar-thumb {
            background: #3a9f6e;
            border-radius: 10px;
        }

        /* информационные бейджи над разделами */
        .info-badge {
            margin: 8px 8px 4px 8px;
            padding: 8px 16px;
            background: linear-gradient(95deg, #0f2a1f, #0a1a2a);
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            border-left: 3px solid #00ffaa;
            border-right: 1px solid rgba(0,255,170,0.2);
            color: #c0ffdd;
        }

        .protocol-divider {
            margin: 12px 8px 8px 8px;
            padding: 6px 12px;
            background: rgba(0, 255, 170, 0.08);
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            color: #6effb0;
            text-align: center;
            letter-spacing: 1px;
            border-left: 2px solid #00ffaa;
        }

        .card-server {
            background: rgba(28, 34, 48, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid rgba(80, 200, 140, 0.2);
        }
        .card-server:active {
            transform: scale(0.98);
            background: rgba(40, 50, 68, 0.85);
            border-color: rgba(0,255,170,0.5);
        }
        .server-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 2;
        }
        .server-name-grad {
            font-weight: 700;
            font-size: 17px;
            background: linear-gradient(135deg, #f0f0ff, #b8f0d0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .ping-container {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .ping-bubble {
            background: #0f121ecc;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-family: monospace;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .ping-value-white {
            color: white;
            font-weight: 500;
        }
        .ping-dot {
            width: 8px;
            height: 8px;
            border-radius: 10px;
            background: #6f6f8a;
            display: inline-block;
        }
        .ping-dot.low { background: #2ed15e; box-shadow: 0 0 4px #2ed15e; }
        .ping-dot.medium { background: #ffb347; }
        .ping-dot.high { background: #ff6b6b; }
        .server-address {
            font-size: 11px;
            color: #9eb0c0;
            background: #00000040;
            padding: 3px 12px;
            border-radius: 20px;
            font-family: monospace;
        }
        .connect-button {
            background: linear-gradient(95deg, #2f6e4a, #1f4e38);
            padding: 8px 22px;
            border-radius: 44px;
            font-size: 14px;
            font-weight: 600;
            color: #f0fff0;
            white-space: nowrap;
            margin-left: 12px;
            text-align: center;
        }

        .footer-note {
            padding: 12px 24px 20px;
            text-align: center;
            font-size: 10px;
            color: #6a7c8c;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #121a24ee;
            backdrop-filter: blur(20px);
            padding: 10px 24px;
            border-radius: 60px;
            color: #e0ffe0;
            font-size: 13px;
            z-index: 2500;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            border: 0.5px solid #00ffaa66;
        }
        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* модалка благодарности */
        .thanks-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .thanks-modal.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-glow-card {
            background: #0c101cee;
            border-radius: 48px;
            max-width: 340px;
            width: 85%;
            padding: 32px 28px;
            text-align: center;
            border: 1px solid rgba(0, 255, 170, 0.5);
            box-shadow: 0 0 40px rgba(0,255,170,0.2);
            transform: scale(0.9);
            transition: transform 0.2s;
        }
        .thanks-modal.active .modal-glow-card {
            transform: scale(1);
        }
        .modal-glow-card h2 {
            font-size: 26px;
            background: linear-gradient(125deg, #B0FFD0, #40E090);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }
        .modal-glow-card p {
            color: #ccddcc;
            font-size: 15px;
            margin-bottom: 28px;
        }
        .subscribe-modal-btn {
            background: #2f6e4a;
            border: none;
            padding: 14px 20px;
            width: 100%;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .close-modal-hint {
            background: transparent;
            border: none;
            color: #7a8a7a;
            font-size: 12px;
            cursor: pointer;
        }

        @media (max-width: 550px) {
            .card-server {
                flex-wrap: wrap;
            }
            .connect-button {
                margin-left: 0;
                margin-top: 10px;
                width: 100%;
            }
            .neon-trigger span {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="glass-master">
    <div class="grad-header">
        <div class="flex-title">
            <div class="logo-block">
                <div class="logo-3d">F+</div>
                <h1>FeastVPN</h1>
            </div>
            <div class="badge-neon">⚡ MAX SPEED</div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap;">
            <div class="badge-neon" style="background: #00000040;">🚀 МИНИМАЛЬНЫЙ ПИНГ</div>
        </div>
    </div>

    <!-- НЕОНОВАЯ КНОПКА АВТОПОДКЛЮЧЕНИЯ -->

    <!-- КНОПКА "СЕРВЕРА" (ПОД НЕОНОВОЙ) -->
    <div class="servers-toggle-btn">

</div>

<div id="toastGlobal" class="toast-message">✨ Готово</div>

<!-- МОДАЛКА БЛАГОДАРНОСТИ -->
<div id="thanksModal" class="thanks-modal">
    <div class="modal-glow-card">
        <h2>✨ Спасибо!</h2>
        <p>Спасибо что используете наш VPN.<br>Если хотите быть в курсе новостей и нас поддержать — подпишитесь на канал по кнопке ниже.</p>
        <button id="modalSubscribeBtn" class="subscribe-modal-btn">📢 ПОДПИСАТЬСЯ → @MrFeastChannel</button>
        <button id="modalCloseBtn" class="close-modal-hint">Закрыть</button>
    </div>
</div>

<script>
    // ---------- MTProto СЕРВЕРА (10 штук) ----------
    const MT_PROTO_SERVERS = [
        {"name": "FeastVPN 1", "server": "quackton.life", "port": 443, "secret": "ee65fc7553a1f5ca8b50b71c015b38722479616e6465782e7275", "type": "mtproto"},
        {"name": "FeastVPN 2", "server": "tg.pepewtf.top", "port": 443, "secret": "eecb3c473c7bbea00855003ab715668c5074672e706570657774662e746f70", "type": "mtproto"},
        {"name": "FeastVPN 3", "server": "tg.openworld.bot", "port": 443, "secret": "cb3c473c7bbea00855003ab715668c50", "type": "mtproto"},
        {"name": "FeastVPN 4", "server": "213.219.212.245", "port": 443, "secret": "9f3c7a8d2e4b1c6f5a7d8e9b0c2f4a1d", "type": "mtproto"},
        {"name": "FeastVPN 5", "server": "VIP.alotaxi.info", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d", "type": "mtproto"},
        {"name": "FeastVPN 6", "server": "peyk.acharbashi.info", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d", "type": "mtproto"},
        {"name": "FeastVPN 7", "server": "nitro.alotaxi.info", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d", "type": "mtproto"},
        {"name": "FeastVPN 8", "server": "alo.acharbashi.info", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d", "type": "mtproto"},
        {"name": "FeastVPN 9", "server": "dedicated.love-internet.xyz", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d", "type": "mtproto"},
        {"name": "FeastVPN 10", "server": "rio.alotaxi.info", "port": 4516, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e636c6f7564666c6172652e636f6d", "type": "mtproto"}
    ];

    // ---------- SOCKS5 СЕРВЕРА ----------
    const SOCKS5_SERVERS = [
        {"name": "FeastVPN 11", "server": "192.111.137.35", "port": 4145, "type": "socks5"},
        {"name": "FeastVPN 12", "server": "192.252.209.155", "port": 14455, "type": "socks5"},
        {"name": "FeastVPN 13", "server": "192.252.211.197", "port": 14921, "type": "socks5"},
        {"name": "FeastVPN 14", "server": "192.252.214.20", "port": 15864, "type": "socks5"},
        {"name": "FeastVPN 15", "server": "192.111.139.165", "port": 4145, "type": "socks5"}
    ];

    let pingMap = new Map();
    let pingUpdating = false;

    // Точное измерение пинга для MTProto
    async function measurePing(server, port, timeoutMs = 2500) {
        const start = performance.now();
        return new Promise((resolve) => {
            let finished = false;
            const timer = setTimeout(() => {
                if (!finished) { finished = true; resolve(timeoutMs); }
            }, timeoutMs);
            const url = `https://${server}:${port}/ping-${Date.now()}-${Math.random()}.gif`;
            const img = new Image();
            img.onload = () => {
                if (!finished) {
                    clearTimeout(timer);
                    finished = true;
                    resolve(Math.min(Math.floor(performance.now() - start), timeoutMs));
                }
            };
            img.onerror = () => {
                if (!finished) {
                    clearTimeout(timer);
                    const elapsed = performance.now() - start;
                    if (elapsed < timeoutMs && elapsed > 5) {
                        finished = true;
                        resolve(Math.min(Math.floor(elapsed), timeoutMs));
                    } else {
                        const controller = new AbortController();
                        const ftimer = setTimeout(() => controller.abort(), 1500);
                        fetch(url, { method: 'HEAD', mode: 'no-cors', cache: 'no-store', signal: controller.signal })
                            .then(() => {
                                if (!finished) {
                                    clearTimeout(ftimer);
                                    const elapsed2 = performance.now() - start;
                                    finished = true;
                                    resolve(Math.min(Math.floor(elapsed2), timeoutMs));
                                }
                            })
                            .catch(() => {
                                if (!finished) {
                                    clearTimeout(ftimer);
                                    const elapsed2 = performance.now() - start;
                                    finished = true;
                                    if (elapsed2 < timeoutMs && elapsed2 > 10) resolve(Math.min(Math.floor(elapsed2), timeoutMs));
                                    else resolve(timeoutMs);
                                }
                            });
                    }
                }
            };
            img.src = url;
        });
    }

    async function refreshPings() {
        if (pingUpdating) return;
        pingUpdating = true;
        const allServers = [...MT_PROTO_SERVERS, ...SOCKS5_SERVERS];
        const tasks = allServers.map(async (srv) => {
            const key = `${srv.type}_${srv.server}:${srv.port}`;
            if (srv.type === 'mtproto') {
                const p1 = await measurePing(srv.server, srv.port, 2500);
                const p2 = await measurePing(srv.server, srv.port, 2500);
                pingMap.set(key, Math.min(p1, p2));
            } else {
                pingMap.set(key, null);
            }
        });
        await Promise.all(tasks);
        pingUpdating = false;
        renderAllPings();
    }

    function renderAllPings() {
        document.querySelectorAll('.card-server').forEach(card => {
            const key = card.getAttribute('data-ping-key');
            if (key && pingMap.has(key)) {
                const val = pingMap.get(key);
                const spanVal = card.querySelector('.ping-value-white');
                const dotSpan = card.querySelector('.ping-dot');
                if (spanVal) {
                    if (val === null) spanVal.textContent = 'SOCKS5';
                    else if (val >= 2500) spanVal.textContent = 'Неизвестно';
                    else spanVal.textContent = `${val} мс`;
                }
                if (dotSpan && val !== null && val < 2500) {
                    dotSpan.classList.remove('low', 'medium', 'high');
                    if (val < 180) dotSpan.classList.add('low');
                    else if (val < 650) dotSpan.classList.add('medium');
                    else dotSpan.classList.add('high');
                } else if (dotSpan && val === null) {
                    dotSpan.classList.remove('low', 'medium', 'high');
                }
            }
        });
    }

    function buildLink(srv) {
        if (srv.type === 'mtproto') {
            return `tg://proxy?server=${encodeURIComponent(srv.server)}&port=${srv.port}&secret=${encodeURIComponent(srv.secret.trim().toLowerCase())}`;
        } else {
            return `tg://socks?server=${encodeURIComponent(srv.server)}&port=${srv.port}`;
        }
    }

    function connectToServer(srv) {
        const link = buildLink(srv);
        showToast(`🔌 ${srv.name}: подключение...`);
        try {
            window.location.href = link;
            setTimeout(() => {
                if (!document.hidden) showToast("💡 Если Telegram не открылся — установите Telegram");
            }, 800);
            setTimeout(() => showThanksModal(), 950);
        } catch(e) {
            showToast("❌ Ошибка", true);
        }
    }

    function showThanksModal() {
        const modal = document.getElementById('thanksModal');
        if (!modal) return;
        modal.classList.add('active');
        modal.addEventListener('click', function bgClose(e) {
            if (e.target === modal) {
                modal.classList.remove('active');
                modal.removeEventListener('click', bgClose);
            }
        });
        const subscribeBtn = document.getElementById('modalSubscribeBtn');
        const closeBtn = document.getElementById('modalCloseBtn');
        const newSubscribeHandler = () => {
            window.open('https://t.me/MrFeastChannel', '_blank');
            modal.classList.remove('active');
        };
        const closeHandler = () => { modal.classList.remove('active'); };
        subscribeBtn.onclick = newSubscribeHandler;
        closeBtn.onclick = closeHandler;
    }

    // Отрисовка единого списка: сначала бейдж MTProto, потом сервера, потом бейдж SOCKS5, потом сервера
    function renderUnifiedList() {
        const container = document.getElementById('unifiedServerList');
        if (!container) return;
        container.innerHTML = '';

        // Бейдж MTProto
        const mtprotoBadge = document.createElement('div');
        mtprotoBadge.className = 'info-badge';
        mtprotoBadge.textContent = '🔐 MTProto — Высокое шифрование, хорошая скорость';
        container.appendChild(mtprotoBadge);

        // MTProto сервера
        MT_PROTO_SERVERS.forEach(srv => {
            const key = `mtproto_${srv.server}:${srv.port}`;
            const card = createCard(srv, key);
            container.appendChild(card);
        });

        // Разделитель / бейдж SOCKS5
        const socks5Badge = document.createElement('div');
        socks5Badge.className = 'info-badge';
        socks5Badge.style.marginTop = '12px';
        socks5Badge.textContent = '⚡ SOCKS5 — Хорошее шифрование, высокая скорость';
        container.appendChild(socks5Badge);

        // SOCKS5 сервера
        SOCKS5_SERVERS.forEach(srv => {
            const key = `socks5_${srv.server}:${srv.port}`;
            const card = createCard(srv, key);
            container.appendChild(card);
        });

        refreshPings();
        if (window.pingInterval) clearInterval(window.pingInterval);
        window.pingInterval = setInterval(() => refreshPings(), 6000);
    }

    function createCard(srv, key) {
        const card = document.createElement('div');
        card.className = 'card-server';
        card.setAttribute('data-ping-key', key);
        const leftDiv = document.createElement('div');
        leftDiv.className = 'server-info';
        const nameSpan = document.createElement('div');
        nameSpan.className = 'server-name-grad';
        nameSpan.textContent = srv.name;
        const pingWrap = document.createElement('div');
        pingWrap.className = 'ping-container';
        const bubble = document.createElement('div');
        bubble.className = 'ping-bubble';
        const dot = document.createElement('span');
        dot.className = 'ping-dot';
        const pingValSpan = document.createElement('span');
        pingValSpan.className = 'ping-value-white';
        pingValSpan.textContent = srv.type === 'mtproto' ? '— мс' : 'SOCKS5';
        bubble.appendChild(dot);
        bubble.appendChild(pingValSpan);
        const addrSpan = document.createElement('span');
        addrSpan.className = 'server-address';
        addrSpan.textContent = `${srv.server}:${srv.port}`;
        pingWrap.appendChild(bubble);
        pingWrap.appendChild(addrSpan);
        leftDiv.appendChild(nameSpan);
        leftDiv.appendChild(pingWrap);
        const connectBtn = document.createElement('div');
        connectBtn.className = 'connect-button';
        connectBtn.textContent = '▶ ПОДКЛЮЧИТЬ';
        card.appendChild(leftDiv);
        card.appendChild(connectBtn);
        card.addEventListener('click', () => connectToServer(srv));
        return card;
    }

    // Авто-подключение по минимальному пингу (только MTProto)
    let autoRunning = false;
    async function autoConnectMinPing() {
        if (autoRunning) { showToast("⏳ Уже подключаем..."); return; }
        const btn = document.getElementById('autoNeonBtn');
        btn?.classList.add('active');
        autoRunning = true;
        showToast("🔍 Поиск сервера с минимальным пингом...");
        await refreshPings();
        let best = null;
        let bestPing = Infinity;
        for (let s of MT_PROTO_SERVERS) {
            const key = `mtproto_${s.server}:${s.port}`;
            let p = pingMap.get(key) || 9999;
            if (p < bestPing && p < 2500) {
                bestPing = p;
                best = s;
            }
        }
        if (!best && MT_PROTO_SERVERS.length) best = MT_PROTO_SERVERS[0];
        if (best) {
            showToast(`✨ Минимальный пинг: ${best.name} (${bestPing < 2500 ? bestPing + ' мс' : 'неизвестно'})`);
            setTimeout(() => {
                connectToServer(best);
                setTimeout(() => btn?.classList.remove('active'), 1500);
                autoRunning = false;
            }, 300);
        } else {
            showToast("⚠️ Сервер не найден", true);
            btn?.classList.remove('active');
            autoRunning = false;
        }
    }

    let serversVisible = true;
    function toggleServers() {
        const wrapper = document.getElementById('serversWrapper');
        const toggleBtn = document.getElementById('serversToggleBtn');
        if (serversVisible) {
            wrapper.style.display = 'none';
            toggleBtn.classList.add('active');
            serversVisible = false;
        } else {
            wrapper.style.display = 'block';
            toggleBtn.classList.remove('active');
            serversVisible = true;
        }
    }

    function showToast(msg, isErr = false) {
        const t = document.getElementById('toastGlobal');
        if (!t) return;
        t.textContent = msg;
        t.style.background = isErr ? "#b13e4ccc" : "#121a24ee";
        t.classList.add('show');
        if (window.toastTmr) clearTimeout(window.toastTmr);
        window.toastTmr = setTimeout(() => t.classList.remove('show'), 2300);
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderUnifiedList();
        const autoBtn = document.getElementById('autoNeonBtn');
        if (autoBtn) autoBtn.addEventListener('click', () => autoConnectMinPing());
        const serversToggle = document.getElementById('serversToggleBtn');
        if (serversToggle) serversToggle.addEventListener('click', toggleServers);
        showToast("🔥 MTProto + SOCKS5 | Минимальный пинг автообновление");
    });
</script>
</body>
</html>
