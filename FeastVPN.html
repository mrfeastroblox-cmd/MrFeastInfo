<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>FeastVPN | Серверы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0c12;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            color: #eef2ff;
            min-height: 100vh;
        }
        .app { max-width: 600px; margin: 0 auto; padding: 16px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #f97316, #ef4444); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .globe-btn { background: #1e293b; border: none; padding: 10px 16px; border-radius: 40px; color: #94a3b8; font-size: 1.2rem; cursor: pointer; }
        .globe-btn:active { background: #2d3a4e; transform: scale(0.96); }
        .status-bar { background: #111827; border-radius: 24px; padding: 12px 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d3a4e; }
        .status-text { font-size: 0.85rem; color: #94a3b8; }
        .active-server { background: #22c55e20; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; color: #22c55e; }
        .servers-list { display: flex; flex-direction: column; gap: 12px; }
        .server-card { background: linear-gradient(135deg, #111827 0%, #0f1722 100%); border-radius: 20px; padding: 14px 16px; border: 1px solid #2a3748; }
        .server-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .server-info { flex: 2; min-width: 140px; }
        .server-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
        .server-stats { display: flex; gap: 12px; font-size: 0.7rem; font-family: monospace; }
        .ping-stat { background: #1e293b; padding: 3px 8px; border-radius: 20px; color: #a5f3fc; }
        .speed-stat { background: #1e293b; padding: 3px 8px; border-radius: 20px; color: #c084fc; }
        .connect-btn { background: #3b82f6; border: none; color: white; font-weight: 600; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; transition: 0.05s linear; }
        .connect-btn:active { background: #2563eb; transform: scale(0.96); }
        .connect-btn.connected { background: #22c55e; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: #0f172a; border-radius: 32px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; padding: 20px; border: 1px solid #2dd4bf40; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #2d3a4e; }
        .modal-header h3 { font-size: 1.3rem; }
        .close-modal { background: #334155; border: none; color: white; font-size: 1.2rem; width: 32px; height: 32px; border-radius: 40px; cursor: pointer; }
        .servers-modal-list { display: flex; flex-direction: column; gap: 12px; }
        .modal-server-item { background: #111827; border-radius: 16px; padding: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .loading { text-align: center; padding: 40px; color: #6c7a91; }
        .update-time { text-align: right; font-size: 0.65rem; color: #475569; margin-top: 8px; }
        footer { text-align: center; font-size: 0.7rem; color: #475569; margin-top: 30px; padding-top: 16px; border-top: 1px solid #1e2a3a; }
        @media (max-width: 480px) { .app { padding: 12px; } .server-name { font-size: 1rem; } .connect-btn { padding: 6px 14px; } }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">🔥 FeastVPN</div>
        <button class="globe-btn" id="openServersBtn">🌍 Серверы</button>
    </div>
    <div class="status-bar">
        <span class="status-text">📡 Активный сервер:</span>
        <span class="active-server" id="activeServerDisplay">Не выбран</span>
    </div>
    <div id="serversContainer" class="servers-list"><div class="loading">🔄 Измерение пинга и скорости...</div></div>
    <div id="updateTime" class="update-time"></div>
    <footer>⚡ Нажмите Connect для активации сервера<br>Показываются 3 сервера с наименьшим пингом</footer>
</div>
<div id="serversModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header"><h3>🌍 Все серверы FeastVPN</h3><button class="close-modal" id="closeModalBtn">✕</button></div>
        <div id="modalServersList" class="servers-modal-list"></div>
    </div>
</div>
<script>
    const FEAST_SERVERS = [
        {"name": "FeastVPN 1", "server": "quackton.life", "port": 443, "secret": "ee65fc7553a1f5ca8b50b71c015b38722479616e6465782e7275"},
        {"name": "FeastVPN 2", "server": "tg.pepewtf.top", "port": 443, "secret": "eecb3c473c7bbea00855003ab715668c5074672e706570657774662e746f70"},
        {"name": "FeastVPN 3", "server": "tg.openworld.bot", "port": 443, "secret": "cb3c473c7bbea00855003ab715668c50"},
        {"name": "FeastVPN 4", "server": "213.219.212.245", "port": 443, "secret": "9f3c7a8d2e4b1c6f5a7d8e9b0c2f4a1d"},
        {"name": "FeastVPN 5", "server": "VIP.alotaxi.info", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d"},
        {"name": "FeastVPN 6", "server": "peyk.acharbashi.info", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d"},
        {"name": "FeastVPN 7", "server": "nitro.alotaxi.info", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d"},
        {"name": "FeastVPN 8", "server": "alo.acharbashi.info", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d"},
        {"name": "FeastVPN 9", "server": "dedicated.love-internet.xyz", "port": 4515, "secret": "eee9a4f23b1d768c04a8d7f39120ca5b6e626973636f7474692e79656b74616e65742e636f6d"}
    ];
    let serversData = {};
    let activeServer = null;
    let lastUpdateTime = null;

    // Тест пинга через WebSocket
    async function testPing(server, port, timeoutMs = 3000) {
        return new Promise((resolve) => {
            const startTime = performance.now();
            let ws = null;
            const timeout = setTimeout(() => {
                if (ws) try { ws.close(); } catch(e) {}
                resolve(null);
            }, timeoutMs);
            try {
                ws = new WebSocket(`wss://${server}:${port}`);
                ws.onopen = () => {
                    clearTimeout(timeout);
                    const ping = Math.round(performance.now() - startTime);
                    try { ws.close(); } catch(e) {}
                    resolve(ping);
                };
                ws.onerror = () => {
                    clearTimeout(timeout);
                    try { ws.close(); } catch(e) {}
                    resolve(null);
                };
                ws.onclose = () => {
                    clearTimeout(timeout);
                    resolve(null);
                };
            } catch(e) {
                clearTimeout(timeout);
                resolve(null);
            }
        });
    }

    // Тест скорости через WebSocket
    async function testSpeed(server, port, timeoutMs = 3000) {
        return new Promise((resolve) => {
            let ws = null;
            const timeout = setTimeout(() => {
                if (ws) try { ws.close(); } catch(e) {}
                resolve(null);
            }, timeoutMs);
            try {
                ws = new WebSocket(`wss://${server}:${port}`);
                let totalSent = 0;
                const testData = new Uint8Array(1024);
                for (let i = 0; i < testData.length; i++) testData[i] = 88;
                ws.onopen = () => {
                    const startTime = performance.now();
                    let sentCount = 0;
                    const maxPackets = 10;
                    function sendNext() {
                        if (sentCount >= maxPackets) {
                            const elapsed = (performance.now() - startTime) / 1000;
                            if (elapsed > 0 && totalSent > 0) {
                                const speedBps = totalSent / elapsed;
                                const speedMbps = Math.round(speedBps / (1024 * 1024) * 10) / 10;
                                clearTimeout(timeout);
                                try { ws.close(); } catch(e) {}
                                resolve(speedMbps);
                            } else {
                                clearTimeout(timeout);
                                try { ws.close(); } catch(e) {}
                                resolve(null);
                            }
                            return;
                        }
                        try {
                            ws.send(testData);
                            totalSent += testData.length;
                            sentCount++;
                            setTimeout(sendNext, 10);
                        } catch(e) {
                            clearTimeout(timeout);
                            try { ws.close(); } catch(e) {}
                            resolve(null);
                        }
                    }
                    sendNext();
                };
                ws.onerror = () => {
                    clearTimeout(timeout);
                    try { ws.close(); } catch(e) {}
                    resolve(null);
                };
                ws.onclose = () => {
                    clearTimeout(timeout);
                    resolve(null);
                };
            } catch(e) {
                clearTimeout(timeout);
                resolve(null);
            }
        });
    }

    async function updateServerStats(serverObj) {
        const ping = await testPing(serverObj.server, serverObj.port);
        let speed = null;
        if (ping !== null) {
            speed = await testSpeed(serverObj.server, serverObj.port);
        }
        serversData[serverObj.server] = {
            ping: ping,
            speed: speed,
            name: serverObj.name,
            server: serverObj.server,
            port: serverObj.port,
            secret: serverObj.secret
        };
        return serversData[serverObj.server];
    }

    async function updateAllServers() {
        for (let server of FEAST_SERVERS) {
            await updateServerStats(server);
        }
        lastUpdateTime = new Date();
        renderMainList();
        renderModalList();
    }

    function formatPing(pingMs) {
        if (pingMs === null || pingMs === undefined) return '-- ms';
        if (pingMs > 1000) return '>1s';
        return `${pingMs} ms`;
    }

    function formatSpeed(speedMbps) {
        if (speedMbps === null || speedMbps === undefined) return '--';
        if (speedMbps >= 1000) return `${(speedMbps / 1000).toFixed(1)} GB/s`;
        if (speedMbps >= 1) return `${speedMbps.toFixed(1)} MB/s`;
        return `${Math.round(speedMbps * 1024)} KB/s`;
    }

    function getFastestServers() {
        const available = FEAST_SERVERS.filter(s => serversData[s.server] && serversData[s.server].ping !== null);
        if (available.length === 0) return FEAST_SERVERS.slice(0, 3);
        return [...available].sort((a, b) => serversData[a.server].ping - serversData[b.server].ping).slice(0, 3);
    }

    function renderMainList() {
        const container = document.getElementById('serversContainer');
        const fastestServers = getFastestServers();
        if (Object.keys(serversData).length === 0) {
            container.innerHTML = '<div class="loading">🔄 Измерение пинга и скорости...</div>';
            return;
        }
        let html = '';
        for (let server of fastestServers) {
            const data = serversData[server.server];
            const pingText = data ? formatPing(data.ping) : '⏳';
            const speedText = data ? formatSpeed(data.speed) : '⏳';
            const isActive = activeServer === server.server;
            html += `
                <div class="server-card">
                    <div class="server-row">
                        <div class="server-info">
                            <div class="server-name">🔥 ${server.name}</div>
                            <div class="server-stats">
                                <span class="ping-stat">📡 ${pingText}</span>
                                <span class="speed-stat">⚡ ${speedText}</span>
                            </div>
                        </div>
                        <button class="connect-btn ${isActive ? 'connected' : ''}" data-server="${server.server}" data-name="${server.name}" data-port="${server.port}" data-secret="${server.secret}">
                            ${isActive ? '✓ Подключен' : 'Connect'}
                        </button>
                    </div>
                </div>
            `;
        }
        document.getElementById('updateTime').innerHTML = lastUpdateTime ? `Обновлено: ${lastUpdateTime.toLocaleTimeString()}` : '';
        container.innerHTML = html;
        attachConnectHandlers();
    }

    function renderModalList() {
        const container = document.getElementById('modalServersList');
        let html = '';
        for (let server of FEAST_SERVERS) {
            const data = serversData[server.server];
            const pingText = data ? formatPing(data.ping) : '⏳';
            const speedText = data ? formatSpeed(data.speed) : '⏳';
            const isActive = activeServer === server.server;
            html += `
                <div class="modal-server-item">
                    <div>
                        <div style="font-weight: 600; margin-bottom: 4px;">🔥 ${server.name}</div>
                        <div style="display: flex; gap: 8px; font-size: 0.7rem;">
                            <span>📡 ${pingText}</span>
                            <span>⚡ ${speedText}</span>
                        </div>
                    </div>
                    <button class="connect-btn ${isActive ? 'connected' : ''}" data-server="${server.server}" data-name="${server.name}" data-port="${server.port}" data-secret="${server.secret}">
                        ${isActive ? '✓ Подключен' : 'Connect'}
                    </button>
                </div>
            `;
        }
        container.innerHTML = html;
        attachModalHandlers();
    }

    // Подключение к серверу - моментальное, без уведомлений
    function connectToServer(server, name, port, secret) {
        const proxyString = `tg://proxy?server=${server}&port=${port}&secret=${secret}`;
        
        activeServer = server;
        document.getElementById('activeServerDisplay').innerText = name;
        
        // Сохраняем в localStorage
        try {
            localStorage.setItem('feast_active_server', JSON.stringify({server, name, port, secret}));
        } catch(e) {}
        
        // Обновляем интерфейс
        renderMainList();
        renderModalList();
        
        // Моментальный редирект на tg:// ссылку
        window.location.href = proxyString;
    }

    function attachConnectHandlers() {
        document.querySelectorAll('#serversContainer .connect-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const server = btn.getAttribute('data-server');
                const name = btn.getAttribute('data-name');
                const port = btn.getAttribute('data-port');
                const secret = btn.getAttribute('data-secret');
                connectToServer(server, name, port, secret);
            };
        });
    }

    function attachModalHandlers() {
        document.querySelectorAll('#modalServersList .connect-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const server = btn.getAttribute('data-server');
                const name = btn.getAttribute('data-name');
                const port = btn.getAttribute('data-port');
                const secret = btn.getAttribute('data-secret');
                connectToServer(server, name, port, secret);
                closeModal();
            };
        });
    }

    function loadActiveServer() {
        try {
            const saved = localStorage.getItem('feast_active_server');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.server) {
                    activeServer = data.server;
                    document.getElementById('activeServerDisplay').innerText = data.name;
                }
            }
        } catch(e) {}
    }

    const modal = document.getElementById('serversModal');
    const openBtn = document.getElementById('openServersBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    
    function openModal() { modal.classList.add('active'); renderModalList(); }
    function closeModal() { modal.classList.remove('active'); }
    
    openBtn.onclick = openModal;
    closeBtn.onclick = closeModal;
    modal.onclick = (e) => { if (e.target === modal) closeModal(); };

    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }

    loadActiveServer();
    updateAllServers();
    setInterval(updateAllServers, 60000);
</script>
</body>
</html>
